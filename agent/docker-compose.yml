services:
  agent:
    image: vizpatch:v1.0.0
    build: .
    container_name: vizpatch-agent
    restart: unless-stopped
    # Startet immer mit — wartet aber im Wait-for-Config-Loop bis /config/.env
    # vollständig ist. Kein Crash, kein Restart-Loop bei leerer Zero-Config-Install.
    volumes:
      - ./config:/config:ro
      - ./prompts:/app/prompts:ro
      - agent-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  webui:
    image: vizpatch-webui:v1.1.0
    build: ../webui
    container_name: vizpatch-webui
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEBUI_COMPOSE_DIR: /compose
    ports:
      - "8080:8080"
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - ./config:/config:rw
      - .:/compose:ro
      - agent-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent-data:
