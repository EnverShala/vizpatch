<div id="chat-root" data-agent-id="{{ agent_id }}">
  <div id="chat-log" aria-live="polite"></div>
  <form id="chat-form">
    <textarea id="chat-input" rows="2" placeholder="Nachricht eingeben…" required></textarea>
    <div id="chat-controls">
      <button type="submit" id="chat-send-btn">Senden</button>
      <button type="button" id="chat-reset-btn">Verlauf zurücksetzen</button>
    </div>
  </form>
</div>
