services:
  agent:
    image: vizpatch:v1.1.0
    container_name: vizpatch-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./context.md:/config/context.md:ro
      - ./prompts:/app/prompts:ro
      - agent-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  webui:
    image: vizpatch-webui:v1.1.0
    container_name: vizpatch-webui
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - ./.env:/config/.env:rw
      - ./context.md:/config/context.md:rw
      - ./docker-compose.yml:/config/docker-compose.yml:ro
      - agent-data:/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent-data:
